<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="theme-color" content="#000000" />
<meta name="apple-mobile-web-app-title" content="GRANULA" />
<link rel="manifest" href="manifest.json" />
<link rel="apple-touch-icon" href="icon-180.png" />
<link rel="icon" href="icon-192.png" />
<title>GRANULA</title>
<style>
  @font-face {
    font-family: "DM Mono";
    src: url(dmmono-300.woff2) format("woff2");
    font-weight: 300; font-style: normal; font-display: swap;
  }
  @font-face {
    font-family: "DM Mono";
    src: url(dmmono-400.woff2) format("woff2");
    font-weight: 400; font-style: normal; font-display: swap;
  }
  @font-face {
    font-family: "DM Mono";
    src: url(dmmono-500.woff2) format("woff2");
    font-weight: 500 700; font-style: normal; font-display: swap;
  }
  :root {
    --yellow: #ffc700;
    --txt: #ffffff;
    --dim: rgba(255,255,255,0.45);
    --ring: rgba(255,255,255,0.22);
    --chip: rgba(0,0,0,0.4);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; -webkit-user-select: none; }
  html, body {
    margin: 0; height: 100%; background: #000; color: var(--txt);
    font-family: "DM Mono", Menlo, ui-monospace, monospace;
    overscroll-behavior: none; overflow: hidden;
  }

  /* ---------- flame visual ---------- */
  #stage { position: fixed; inset: 0; overflow: hidden; touch-action: none; }
  .palette { position: absolute; inset: 0; opacity: 0; will-change: opacity; pointer-events: none; }
  .blob {
    position: absolute; left: 50%; border-radius: 50%;
    pointer-events: none; will-change: transform, opacity;
  }
  .bTop { width: 90vmin; height: 110vmin; top: -20vmin; margin-left: -45vmin; }
  .bMid { width: 70vmin; height: 90vmin; top: 30%; margin-left: -35vmin; }
  .bBot { width: 85vmin; height: 100vmin; bottom: -30vmin; margin-left: -42.5vmin; }

  /* ember: красный → крем → бирюза */
  .palette[data-pal="ember"] .bTop { background: radial-gradient(ellipse 50% 50% at 50% 50%,
    rgba(232,64,32,0.95) 0%, rgba(190,42,28,0.55) 35%, rgba(120,20,16,0.18) 60%, transparent 75%); }
  .palette[data-pal="ember"] .bMid { background: radial-gradient(ellipse 50% 50% at 50% 50%,
    rgba(240,200,178,0.75) 0%, rgba(214,142,118,0.35) 45%, transparent 72%); }
  .palette[data-pal="ember"] .bBot { background: radial-gradient(ellipse 50% 50% at 50% 50%,
    rgba(58,124,114,0.85) 0%, rgba(40,92,86,0.4) 45%, transparent 72%); }

  /* orchid: маджента → лиловый → стальной синий */
  .palette[data-pal="orchid"] .bTop { background: radial-gradient(ellipse 50% 50% at 50% 50%,
    rgba(216,44,180,0.9) 0%, rgba(160,32,140,0.5) 35%, rgba(90,20,80,0.16) 60%, transparent 75%); }
  .palette[data-pal="orchid"] .bMid { background: radial-gradient(ellipse 50% 50% at 50% 50%,
    rgba(186,158,200,0.7) 0%, rgba(140,110,165,0.32) 45%, transparent 72%); }
  .palette[data-pal="orchid"] .bBot { background: radial-gradient(ellipse 50% 50% at 50% 50%,
    rgba(84,124,196,0.85) 0%, rgba(58,88,150,0.4) 45%, transparent 72%); }

  /* nebula: пыльная роза → золото → фиолет снизу */
  .palette[data-pal="nebula"] .bTop { background: radial-gradient(ellipse 50% 50% at 50% 50%,
    rgba(158,96,96,0.6) 0%, rgba(110,64,70,0.32) 40%, transparent 72%); }
  .palette[data-pal="nebula"] .bMid { background: radial-gradient(ellipse 50% 50% at 50% 50%,
    rgba(226,198,124,0.8) 0%, rgba(170,140,90,0.35) 45%, transparent 72%); }
  .palette[data-pal="nebula"] .bBot { background: radial-gradient(ellipse 50% 50% at 50% 50%,
    rgba(96,74,228,0.95) 0%, rgba(70,52,180,0.5) 45%, transparent 75%); }

  /* горячее пятно под пальцем (kaoss) + канвас частиц */
  #touchGlow { display: none; } /* заменён ASCII-сеткой */
  #fx { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; }

  /* rec: розово-фиолетовое свечение */
  .palette[data-pal="rec"] .bTop { background: radial-gradient(ellipse 50% 50% at 50% 50%,
    rgba(70,20,90,0.8) 0%, rgba(40,10,60,0.4) 45%, transparent 72%); }
  .palette[data-pal="rec"] .bMid { background: radial-gradient(ellipse 50% 50% at 50% 50%,
    rgba(235,120,200,0.65) 0%, rgba(180,80,160,0.3) 45%, transparent 72%); }
  .palette[data-pal="rec"] .bBot { background: radial-gradient(ellipse 50% 50% at 50% 50%,
    rgba(255,70,210,0.9) 0%, rgba(160,60,200,0.45) 45%, transparent 72%); }

  /* corner hints */
  .corner {
    position: absolute; font-size: 10px; letter-spacing: 2px; color: rgba(255,255,255,0.22);
    pointer-events: none; text-transform: uppercase; font-weight: 600;
  }
  .corner.tl { top: calc(env(safe-area-inset-top) + 64px); left: 20px; }
  .corner.tr { top: calc(env(safe-area-inset-top) + 64px); right: 20px; }
  .corner.bl { bottom: 160px; left: 20px; }
  .corner.br { bottom: 160px; right: 20px; }

  /* ---------- top bar ---------- */
  #topbar {
    position: fixed; top: calc(env(safe-area-inset-top) + 12px); left: 16px; right: 16px;
    display: flex; align-items: center; justify-content: space-between; z-index: 5;
  }
  #sampleChip {
    background: var(--chip); border: none; color: var(--txt);
    font-size: 12px; font-weight: 600; padding: 10px 16px; border-radius: 100px;
    max-width: 55vw; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
  }
  .roundbtn {
    width: 44px; height: 44px; border-radius: 50%; border: none;
    background: var(--chip); color: var(--txt); font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
  }
  #topbar .right { display: flex; gap: 10px; }
  #recBtn::before { content: ""; width: 12px; height: 12px; border-radius: 50%; background: #ff3b30; display: block; }

  /* ---------- knobs ---------- */
  #knobs {
    position: fixed; left: 0; right: 0; bottom: calc(env(safe-area-inset-bottom) + 40px);
    display: flex; gap: 40px; align-items: flex-end; justify-content: center; z-index: 5;
  }
  .knob { position: relative; width: 38px; height: 38px; transition: width 0.25s, height 0.25s; touch-action: none; }
  .knob svg { position: absolute; inset: 0; width: 100%; height: 100%; overflow: visible; }
  .knob .track { fill: none; stroke: var(--ring); stroke-width: 2; }
  .knob .arc { fill: none; stroke: var(--yellow); stroke-width: 3; stroke-linecap: round; transition: stroke-width 0.25s; }
  .knob .letter {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 700; transition: font-size 0.25s; pointer-events: none;
  }
  .knob.big { width: 87px; height: 87px; }
  .knob.big .arc { stroke-width: 6; }
  .knob.big .letter { font-size: 22px; }
  .knob .tip {
    position: absolute; bottom: calc(100% + 12px); left: 0;
    background: rgba(30,30,30,0.9); color: #fff; font-size: 11px; font-weight: 600;
    padding: 5px 9px; border-radius: 6px; white-space: nowrap;
    opacity: 0; transition: opacity 0.2s; pointer-events: none;
  }
  .knob.big .tip { opacity: 1; }
  #closeKnob {
    position: fixed; top: calc(env(safe-area-inset-top) + 12px); right: 16px; z-index: 6;
    width: 56px; height: 56px; border-radius: 50%; border: none;
    background: var(--chip); color: #fff; font-size: 20px;
    backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    display: none; align-items: center; justify-content: center;
  }
  body.adjusting #closeKnob { display: flex; }
  body.adjusting #topbar { opacity: 0; pointer-events: none; }

  /* ---------- overlays ---------- */
  .overlay {
    position: fixed; inset: 0; z-index: 20; background: #000;
    display: none; flex-direction: column; align-items: center; justify-content: center;
  }
  .overlay.show { display: flex; }

  #startFx { position: absolute; inset: 0; width: 100%; height: 100%; }
  #start h2 {
    position: relative; z-index: 1; margin: 0;
    font-size: 42px; font-weight: 300; letter-spacing: 1px;
    color: #f2f2f2; text-transform: lowercase;
  }
  #start p {
    position: absolute; z-index: 1; bottom: 16%;
    color: rgba(255,255,255,0.55); font-size: 14px; margin: 0; letter-spacing: 0.5px;
  }

  /* окно записи: шит, подъезжающий снизу */
  #recOverlay { position: fixed; inset: 0; z-index: 25; pointer-events: none; }
  #recOverlay.show { pointer-events: auto; }
  #recSheet {
    position: absolute; inset: 0; background: #050505;
    border-radius: 28px 28px 0 0;
    transform: translateY(103%);
    transition: transform 0.38s cubic-bezier(0.2, 0.8, 0.2, 1);
    display: flex; flex-direction: column; align-items: center;
    padding-top: calc(env(safe-area-inset-top) + 58px);
    box-shadow: 0 -12px 40px rgba(0,0,0,0.6);
  }
  #recOverlay.show #recSheet { transform: translateY(0); }
  #recHead {
    font-size: 11px; letter-spacing: 3px; color: #c9c9c9;
    display: flex; align-items: center; gap: 9px; text-transform: uppercase;
  }
  #recDot {
    width: 6px; height: 6px; border-radius: 50%; background: #ff3b30;
    animation: blink 1.2s steps(2, start) infinite;
  }
  #recClose {
    position: absolute; top: calc(env(safe-area-inset-top) + 46px); right: 18px;
    width: 44px; height: 44px; background: none; border: none;
    color: #8a8a8a; font-size: 22px; z-index: 1;
  }
  #recTimer {
    margin-top: 13vh; font-size: 52px; font-weight: 400; color: #fff;
    letter-spacing: 6px; font-variant-numeric: tabular-nums;
  }
  #recWave { position: absolute; inset: 0; width: 100%; height: 100%; display: block; }
  #recHead, #recTimer { position: relative; z-index: 1; }
  #stopBtn {
    position: absolute; bottom: calc(env(safe-area-inset-bottom) + 56px);
    width: 132px; height: 42px; border: none; border-radius: 999px;
    background: #3a0d0d; color: #ff9d9d; z-index: 1;
    font-size: 12px; letter-spacing: 3px; font-family: inherit; text-transform: uppercase;
  }

  /* library */
  #library { background: rgba(0,0,0,0.88); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); justify-content: flex-end; }
  #libSheet {
    width: 100%; max-height: 70vh; overflow-y: auto;
    padding: 20px 20px calc(env(safe-area-inset-bottom) + 24px);
  }
  #libSheet h3 { font-size: 12px; letter-spacing: 3px; color: var(--dim); margin: 0 0 14px; text-transform: uppercase; }
  .librow {
    display: flex; align-items: center; gap: 12px; padding: 14px 4px;
    border-bottom: 1px solid rgba(255,255,255,0.08); font-size: 14px;
  }
  .librow .nm { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .librow .dur { color: var(--dim); font-size: 12px; }
  .librow .del, .librow .edit { background: none; border: none; color: var(--dim); font-size: 16px; padding: 4px 8px; }
  .librow input.nm-edit {
    flex: 1; min-width: 0; background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.25); border-radius: 6px;
    color: #fff; font-size: 14px; padding: 6px 8px; outline: none;
    user-select: text; -webkit-user-select: text;
  }
  .librow.current .nm { color: var(--yellow); }
  #loadFileRow { color: var(--yellow); font-weight: 600; }

  #toast {
    position: fixed; bottom: calc(env(safe-area-inset-bottom) + 140px); left: 50%;
    transform: translateX(-50%); z-index: 30;
    background: rgba(30,30,30,0.92); color: #fff; font-size: 12px;
    padding: 10px 16px; border-radius: 100px; opacity: 0; transition: opacity 0.3s;
    pointer-events: none; white-space: nowrap;
  }
  input[type=file] { display: none; }
</style>
</head>
<body>

<div id="stage">
  <div class="palette" data-pal="ember"><div class="blob bTop"></div><div class="blob bMid"></div><div class="blob bBot"></div></div>
  <div class="palette" data-pal="orchid"><div class="blob bTop"></div><div class="blob bMid"></div><div class="blob bBot"></div></div>
  <div class="palette" data-pal="nebula"><div class="blob bTop"></div><div class="blob bMid"></div><div class="blob bBot"></div></div>
  <div class="palette" data-pal="rec"><div class="blob bTop"></div><div class="blob bMid"></div><div class="blob bBot"></div></div>
  <div id="touchGlow"></div>
  <canvas id="fx"></canvas>
  <span class="corner tl">Halo</span>
  <span class="corner tr">Pulse</span>
  <span class="corner bl">Tide</span>
  <span class="corner br">Chaos</span>
</div>

<div id="topbar">
  <button id="sampleChip">—</button>
  <div class="right">
    <button class="roundbtn" id="playBtn">❚❚</button>
    <button class="roundbtn" id="recBtn" aria-label="record"></button>
  </div>
</div>

<div id="knobs"></div>
<button id="closeKnob">✕</button>

<div class="overlay show" id="start">
  <canvas id="startFx"></canvas>
  <h2>granula</h2>
  <p>tap to start</p>
</div>

<div id="recOverlay">
  <div id="recSheet">
    <div id="recHead"><span id="recDot"></span>Recording...</div>
    <button id="recClose" aria-label="cancel">✕</button>
    <div id="recTimer">00:00</div>
    <canvas id="recWave"></canvas>
    <button id="stopBtn">Stop</button>
  </div>
</div>

<div class="overlay" id="library">
  <div id="libSheet">
    <h3>Samples</h3>
    <div id="libList"></div>
    <label class="librow" id="loadFileRow">Загрузить файл (mp3 / wav)…
      <input type="file" id="file" accept=".mp3,.wav,audio/mpeg,audio/wav,audio/x-wav,audio/*" />
    </label>
  </div>
</div>

<div id="toast"></div>

<script>
(() => {
"use strict";

// ================= params =================
const MAX_SECONDS = 30;
const KNOBS = {
  G: { label: "Grain size", min: 15, max: 400, value: 90,  fmt: v => Math.round(v) + " ms" },
  P: { label: "Position",   min: 0,  max: 1,   value: 0.3, fmt: v => Math.round(v * 100) + " %" },
  D: { label: "Density",    min: 2,  max: 60,  value: 18,  fmt: v => Math.round(v) + " /s" },
  S: { label: "Spread",     min: 0,  max: 1,   value: 0.45,fmt: v => Math.round(v * 100) + " %" },
};

// morph point (XY pad), 0..1, center = neutral
const morph = { x: 0.5, y: 0.5, tx: 0.5, ty: 0.5, touching: false };

let ctx, master, analyser, reverbIn, dryGate, buffer = null, revBuf = null;
let playing = true, schedulerId = null, nextGrainTime = 0;
let currentName = "—", currentId = null;

const $ = (id) => document.getElementById(id);
const toastEl = $("toast");
let toastT = null;
function toast(msg, ms = 2600) {
  toastEl.textContent = msg; toastEl.style.opacity = 1;
  clearTimeout(toastT); toastT = setTimeout(() => toastEl.style.opacity = 0, ms);
}

const HANN = (() => {
  const N = 256, a = new Float32Array(N);
  for (let i = 0; i < N; i++) a[i] = 0.5 * (1 - Math.cos((2 * Math.PI * i) / (N - 1)));
  return a;
})();

// ================= audio =================
const MASTER_VOL = 0.85;

// iOS: тип аудиосессии. "playback" звучит даже при беззвучном переключателе,
// "play-and-record" — во время записи. Без этого на iPhone тишина/тихий динамик.
function setSession(type) {
  try { if (navigator.audioSession) navigator.audioSession.type = type; } catch (e) {}
}

function initAudio() {
  setSession("playback");
  ctx = new (window.AudioContext || window.webkitAudioContext)({ latencyHint: "interactive" });
  master = ctx.createGain();
  master.gain.value = MASTER_VOL;
  analyser = ctx.createAnalyser();
  analyser.fftSize = 512;
  master.connect(analyser).connect(ctx.destination);

  // транс-гейт: режет только сухие зёрна, реверб-облако остаётся непрерывным
  dryGate = ctx.createGain();
  dryGate.gain.value = 1;
  dryGate.connect(master);

  // shimmer reverb: bus -> convolver(6s) -> gain -> master
  reverbIn = ctx.createGain();
  const conv = ctx.createConvolver();
  conv.buffer = makeIR(6, 2.8);
  const wet = ctx.createGain();
  wet.gain.value = 0.9;
  reverbIn.connect(conv).connect(wet).connect(master);
}

function makeIR(seconds, decay) {
  const sr = ctx.sampleRate, len = Math.floor(seconds * sr);
  const ir = ctx.createBuffer(2, len, sr);
  for (let ch = 0; ch < 2; ch++) {
    const d = ir.getChannelData(ch);
    for (let i = 0; i < len; i++) {
      d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, decay);
    }
  }
  return ir;
}

function genPad() {
  const sr = ctx.sampleRate, secs = 5, len = secs * sr;
  const buf = ctx.createBuffer(2, len, sr);
  const L = buf.getChannelData(0), R = buf.getChannelData(1);
  const roots = [110, 164.81, 220, 277.18];
  for (let i = 0; i < len; i++) {
    const t = i / sr;
    let s = 0;
    for (let k = 0; k < roots.length; k++) {
      const det = 1 + 0.0015 * Math.sin(2 * Math.PI * (0.1 + k * 0.07) * t);
      s += Math.sin(2 * Math.PI * roots[k] * det * t) / roots.length;
      s += 0.25 * Math.sin(2 * Math.PI * roots[k] * 2 * t) / roots.length;
    }
    const amp = 0.55 * (0.7 + 0.3 * Math.sin(2 * Math.PI * 0.13 * t));
    L[i] = s * amp; R[i] = s * amp;
  }
  return buf;
}

function decode(arrayBuf) {
  return new Promise((resolve, reject) => {
    const r = ctx.decodeAudioData(arrayBuf, resolve, reject);
    if (r && r.then) r.then(resolve, reject);
  });
}

function trimToMax(buf) {
  const maxLen = Math.floor(MAX_SECONDS * buf.sampleRate);
  if (buf.length <= maxLen) return buf;
  const out = ctx.createBuffer(buf.numberOfChannels, maxLen, buf.sampleRate);
  for (let ch = 0; ch < buf.numberOfChannels; ch++)
    out.getChannelData(ch).set(buf.getChannelData(ch).subarray(0, maxLen));
  return out;
}

// реверс-копия сэмпла: зёрна задом наперёд звучат «как сон», тональность не меняется
function reverseBuffer(buf) {
  const out = ctx.createBuffer(buf.numberOfChannels, buf.length, buf.sampleRate);
  for (let ch = 0; ch < buf.numberOfChannels; ch++) {
    const s = buf.getChannelData(ch), d = out.getChannelData(ch);
    for (let i = 0, n = buf.length; i < n; i++) d[i] = s[n - 1 - i];
  }
  return out;
}

// только усиливаем тихое (записи с микрофона), громкое не трогаем
function normalizeBuffer(buf, target = 0.85) {
  let peak = 0;
  for (let ch = 0; ch < buf.numberOfChannels; ch++) {
    const d = buf.getChannelData(ch);
    for (let i = 0; i < d.length; i++) {
      const a = Math.abs(d[i]);
      if (a > peak) peak = a;
    }
  }
  if (peak > 0.001 && peak < target) {
    const g = target / peak;
    for (let ch = 0; ch < buf.numberOfChannels; ch++) {
      const d = buf.getChannelData(ch);
      for (let i = 0; i < d.length; i++) d[i] *= g;
    }
  }
  return buf;
}

// ================= grain engine =================
// corner strengths from morph point: TL air, TR swarm, BL deep, BR chaos
function cornerStrengths() {
  const x = morph.x, y = morph.y;
  const w = {
    tl: (1 - x) * (1 - y), tr: x * (1 - y),
    bl: (1 - x) * y,       br: x * y,
  };
  const s = {};
  for (const k in w) s[k] = Math.max(0, (w[k] - 0.25) / 0.75);
  return s;
}

function scheduleGrain(when) {
  if (!buffer) return;
  const c = cornerStrengths();
  const S = KNOBS.S.value;

  // Halo (TL): без транспонирования всего звука — вероятностные октавные
  // блёстки, мелкие зёрна, реверс-зёрна, много шиммера. Гармония, не сдвиг.
  // Tide (BL): «прилив» — длинные зёрна, позиция медленно плывёт по сэмплу,
  // хорус-детюн ±30 центов, редкие суб-октавы.
  // Chaos (BR): случайные, но гармоничные интервалы, взвешены к тонике.
  let sizeMs = KNOBS.G.value * (1 - 0.4 * c.tl) * (1 + 1.8 * c.bl);
  const HARMONY = [0, 0, 0, 7, -7, 12, -12, 5, -5];
  let pitch = 0;
  if (Math.random() < c.tl * 0.5) pitch += Math.random() < 0.7 ? 12 : 7;
  if (Math.random() < c.bl * 0.25) pitch -= 12;
  if (Math.random() < c.br) pitch += HARMONY[(Math.random() * HARMONY.length) | 0];
  pitch += (Math.random() - 0.5) * 0.6 * c.bl; // хорус-тепло, не фальшь
  const reverse = !!revBuf && Math.random() < (0.12 + 0.5 * c.tl + 0.25 * c.bl);
  const sprayMs = 20 + 260 * S + 350 * c.br;
  const panAmt = 0.25 + 0.75 * S;
  const shimmerSend = 0.18 + 0.45 * S + 0.4 * c.tl + 0.3 * c.bl;

  const dur = sizeMs / 1000;
  const jitter = (Math.random() * 2 - 1) * (sprayMs / 1000);
  const tide = Math.sin(performance.now() / 1000 * 0.45) * 0.12 * c.bl;
  let startSec = (KNOBS.P.value + tide) * buffer.duration + jitter;
  startSec = Math.max(0, Math.min(buffer.duration - 0.001, startSec));
  const rate = Math.pow(2, pitch / 12);

  const dens = effDensity();
  const peak = Math.min(0.9, 1.4 / Math.sqrt(dens));

  spawnVoice(when, startSec, dur, rate, panAmt, peak, shimmerSend, false, reverse);
  // shimmer voice: +1 octave, mostly into reverb
  if (Math.random() < 0.4 + 0.5 * c.tl) {
    spawnVoice(when + 0.01, startSec, dur * 1.4, rate * 2, panAmt, peak * (0.25 + 0.3 * S), 1.0, true, reverse);
  }
}

function spawnVoice(when, startSec, dur, rate, panAmt, peak, sendAmt, wetOnly, reverse) {
  let buf = buffer;
  if (reverse && revBuf) {
    buf = revBuf;
    startSec = Math.max(0, buf.duration - startSec - dur * rate);
  }
  const src = ctx.createBufferSource();
  src.buffer = buf;
  src.playbackRate.value = rate;
  const g = ctx.createGain();
  g.gain.value = 0;
  g.gain.setValueCurveAtTime(HANN.map(v => v * peak), when, dur);
  const pan = ctx.createStereoPanner();
  pan.pan.value = (Math.random() * 2 - 1) * panAmt;
  src.connect(g).connect(pan);
  if (!wetOnly) pan.connect(dryGate);
  const send = ctx.createGain();
  send.gain.value = sendAmt;
  pan.connect(send).connect(reverbIn);
  const srcDur = dur * rate;
  src.start(when, startSec, Math.min(srcDur, buf.duration - startSec));
  src.stop(when + dur + 0.02);
  src.onended = () => { src.disconnect(); g.disconnect(); pan.disconnect(); send.disconnect(); };
}

function effDensity() {
  const c = cornerStrengths();
  // Tide: меньше зёрен, но длиннее — глубокая волна, не каша
  return KNOBS.D.value * (1 + 1.2 * c.tr + 0.6 * c.br) * (1 - 0.3 * c.bl);
}

// ---- транс-гейт (угол Pulse): X = интенсивность, Y = скорость (1/2..1/16) ----
const GATE_BEAT = 60 / 126;                  // четверть на 126 BPM
const GATE_MULTS = [2, 1, 0.5, 0.25];        // 1/2, 1/4, 1/8, 1/16 (доли четверти)
let nextGateTime = 0, gateStep = GATE_BEAT;
// глубина и шаг из позиции морфа в верхне-правом квадранте
function gateParams() {
  const rx = Math.max(0, Math.min(1, (morph.x - 0.5) * 2)); // вправо → глубже
  const uy = Math.max(0, Math.min(1, (0.5 - morph.y) * 2)); // вверх → быстрее
  const depth = rx * uy > 0.04 ? rx : 0;                    // активен в квадранте
  const idx = Math.min(3, Math.floor(uy * 4));              // 0..3 → 1/2..1/16
  return { depth, step: GATE_BEAT * GATE_MULTS[idx] };
}
function gateTick() {
  if (!ctx) return;
  if (nextGateTime < ctx.currentTime) nextGateTime = ctx.currentTime;
  const ahead = ctx.currentTime + 0.2;
  while (nextGateTime < ahead) {
    const t = nextGateTime;
    const { depth, step } = gateParams();
    gateStep = step;
    if (depth > 0.02) {
      dryGate.gain.setTargetAtTime(1, t, 0.006);
      dryGate.gain.setTargetAtTime(1 - 0.97 * depth, t + step * 0.5, 0.01);
    } else {
      dryGate.gain.setTargetAtTime(1, t, 0.03);
    }
    nextGateTime += step;
  }
}

const LOOKAHEAD = 0.12, TICK = 25;
function schedulerTick() {
  const ahead = ctx.currentTime + LOOKAHEAD;
  while (nextGrainTime < ahead) {
    scheduleGrain(nextGrainTime);
    nextGrainTime += (1 / effDensity()) * (0.85 + Math.random() * 0.3);
  }
}
function startCloud() {
  if (schedulerId || !buffer) return;
  nextGrainTime = ctx.currentTime + 0.05;
  schedulerId = setInterval(schedulerTick, TICK);
}
function stopCloud() {
  clearInterval(schedulerId); schedulerId = null;
}

// ================= IndexedDB =================
let db = null;
function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open("granula-db", 1);
    req.onupgradeneeded = () => req.result.createObjectStore("samples", { keyPath: "id", autoIncrement: true });
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}
function idb(mode, fn) {
  return new Promise((resolve, reject) => {
    if (!db) return resolve(null);
    const tx = db.transaction("samples", mode);
    const store = tx.objectStore("samples");
    const req = fn(store);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}
const dbAdd = (rec) => idb("readwrite", s => s.add(rec));
const dbPut = (rec) => idb("readwrite", s => s.put(rec));
const dbAll = () => idb("readonly", s => s.getAll());
const dbGet = (id) => idb("readonly", s => s.get(id));
const dbDel = (id) => idb("readwrite", s => s.delete(id));

// ================= recording =================
let mediaRec = null, recChunks = [], recTimerId = null, recStart = 0;
let isRecording = false, micAnalyser = null, micSrc = null, recCancelled = false;
let recBusy = false, recStream = null; // защита от двойного старта + ссылка на стрим, чтобы микрофон никогда не «зависал»

// точечная осциллограмма записи: волна ползёт влево, точки закрашиваются громкостью
const recWave = $("recWave");
const rwc = recWave.getContext("2d");
let rwCols = 0, rwRows = 17, rwMid = 0, rwHist = null, rwLastPush = 0, rwDpr = 1, rwBase = null;
const RW_PITCH = 14, RW_DOT = 3, RW_STEP_MS = 54;
const RW_BAND_HALF = 9; // высота волны: ±9 точек (шаг вдвое шире, пиксельная высота та же)

function initRecWave() {
  rwDpr = Math.min(2, window.devicePixelRatio || 1);
  const r = recWave.getBoundingClientRect();
  recWave.width = Math.floor(r.width * rwDpr);
  recWave.height = Math.floor(r.height * rwDpr);
  const P = RW_PITCH * rwDpr, dot = RW_DOT * rwDpr;
  rwCols = Math.floor(recWave.width / P);
  rwRows = Math.floor(recWave.height / P) | 1;
  // ось волны — ровно посередине между таймером и кнопкой Stop
  // (rect'ы внутри одного transform, разности корректны даже во время анимации шита)
  const tB = $("recTimer").getBoundingClientRect().bottom;
  const sT = $("stopBtn").getBoundingClientRect().top;
  rwMid = Math.round(((tB + sT) / 2 - r.top) * rwDpr / P);
  rwMid = Math.max(RW_BAND_HALF + 2, Math.min(rwRows - RW_BAND_HALF - 3, rwMid));
  rwHist = new Float32Array(rwCols);
  rwLastPush = 0;
  // фон-паттерн из точек на весь экран + центральная ось — рендерим один раз
  rwBase = document.createElement("canvas");
  rwBase.width = recWave.width; rwBase.height = recWave.height;
  const b = rwBase.getContext("2d");
  b.fillStyle = "#fff";
  for (let row = 0; row < rwRows; row++) {
    b.globalAlpha = row === rwMid ? 0.3 : 0.09;
    for (let c = 0; c < rwCols; c++) {
      b.fillRect(c * P + (P - dot) / 2, row * P + (P - dot) / 2, dot, dot);
    }
  }
}

function drawRecWave(level) {
  if (!rwHist) return;
  const now = performance.now();
  if (now - rwLastPush > RW_STEP_MS) {
    rwHist.copyWithin(0, 1);
    // децибельная шкала (как VU-метр): −48дБ тишина … −6дБ громко.
    // линейный RMS у микрофона iPhone крошечный даже для громкого голоса,
    // поэтому линейная шкала прижимала волну к оси
    const db = 20 * Math.log10(Math.max(level, 0.0001));
    rwHist[rwCols - 1] = Math.min(1, Math.max(0, (db + 48) / 42));
    rwLastPush = now;
  }
  const P = RW_PITCH * rwDpr, dot = RW_DOT * rwDpr;
  const tb = (now / 130) | 0; // тайм-бакет: вспышка живёт ~130мс, а не один кадр
  rwc.clearRect(0, 0, recWave.width, recWave.height);
  if (rwBase) rwc.drawImage(rwBase, 0, 0);
  for (let c = 0; c < rwCols; c++) {
    const amp = rwHist[c];
    if (amp <= 0.02) continue;
    // прогрессия поверх дБ-шкалы: тихое — 1-2 точки, громкое заливает столб
    const lit = Math.max(1, Math.round(Math.pow(amp, 1.4) * RW_BAND_HALF));
    const x = c * P + (P - dot) / 2;
    const dMax = lit >= 2 ? lit + 1 : lit - 1; // одиночная тихая точка — без ореола
    for (let d = 0; d <= dMax; d++) {
      let a;
      rwc.fillStyle = "#fff";
      if (d < lit) {
        a = 0.95;
        // детерминированное «мигание» ячейки в голубой на время бакета
        if ((((c * 73856093) ^ (d * 19349663) ^ (tb * 83492791)) >>> 0) % 14 === 0) {
          rwc.fillStyle = "#4fc3ff"; a = 1;
        }
      } else if (d === lit) a = 0.5; // ореол
      else a = 0.2;                  // ореол, слой 2
      rwc.globalAlpha = a;
      rwc.fillRect(x, (rwMid - d) * P + (P - dot) / 2, dot, dot);
      if (d) rwc.fillRect(x, (rwMid + d) * P + (P - dot) / 2, dot, dot);
    }
  }
  rwc.globalAlpha = 1;
}

function muteMaster() {
  master.gain.cancelScheduledValues(ctx.currentTime);
  master.gain.setTargetAtTime(0, ctx.currentTime, 0.05);
}
function unmuteMaster() {
  master.gain.cancelScheduledValues(ctx.currentTime);
  master.gain.setTargetAtTime(MASTER_VOL, ctx.currentTime, 0.1);
}

async function startRec() {
  // guard ставим ДО первого await: двойной тап по REC раньше запускал две записи,
  // второй стрим перетирал первый — осиротевший микрофон висел вечно и глушил динамик
  if (recBusy || isRecording) return;
  recBusy = true;
  if (recStream) { try { recStream.getTracks().forEach(t => t.stop()); } catch (e) {} recStream = null; }
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    toast("микрофон требует https"); recBusy = false; return;
  }

  // глушим ВСЁ до запроса микрофона: и облако, и хвост реверба,
  // иначе динамик орёт в микрофон, пока висит диалог разрешения
  stopCloud();
  muteMaster();
  setSession("play-and-record");

  let stream;
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: true },
    });
  } catch (e) {
    setSession("playback"); unmuteMaster();
    if (playing) startCloud();
    toast("нет доступа к микрофону"); recBusy = false; return;
  }
  recStream = stream;
  recChunks = [];
  try { mediaRec = new MediaRecorder(stream); }
  catch (e) {
    stream.getTracks().forEach(t => t.stop());
    recStream = null;
    setSession("playback"); unmuteMaster();
    if (playing) startCloud();
    toast("запись не поддерживается"); recBusy = false; return;
  }

  // пламя реагирует на микрофон во время записи
  try {
    micSrc = ctx.createMediaStreamSource(stream);
    micAnalyser = ctx.createAnalyser();
    micAnalyser.fftSize = 512;
    micSrc.connect(micAnalyser); // в destination НЕ подключаем — иначе завязка
  } catch (e) { micAnalyser = null; }

  mediaRec.ondataavailable = (e) => { if (e.data && e.data.size) recChunks.push(e.data); };
  mediaRec.onstop = async () => {
    isRecording = false;
    stream.getTracks().forEach(t => t.stop());
    recStream = null;
    recBusy = false;
    if (micSrc) { try { micSrc.disconnect(); } catch (e) {} micSrc = null; }
    micAnalyser = null;
    clearInterval(recTimerId);
    setPalette(samplePal);
    $("recOverlay").classList.remove("show");

    // возвращаем громкий динамик: сессия playback + пинок контексту
    // (iOS иначе оставляет тихий разговорный динамик после записи)
    setSession("playback");
    try { await ctx.suspend(); await ctx.resume(); } catch (e) {}
    unmuteMaster();

    if (recCancelled) { // ✕ — закрыть без сохранения
      if (playing && buffer) startCloud();
      return;
    }

    const blob = new Blob(recChunks, { type: mediaRec.mimeType || "audio/webm" });
    const name = randomRecName();
    const ok = await useBlob(blob, name, null);
    if (!ok) { if (playing && buffer) startCloud(); return; }
    try {
      const id = await dbAdd({ name, blob, duration: buffer.duration, ts: Date.now() });
      currentId = id; localStorage.setItem("granula-last", id);
      renderLibrary();
    } catch (e) {}
  };

  isRecording = true;
  recCancelled = false;
  mediaRec.start();
  recStart = Date.now();
  setPalette("rec");
  $("recTimer").textContent = "00:00";
  $("recOverlay").classList.add("show");
  initRecWave();
  recTimerId = setInterval(() => {
    const s = Math.floor((Date.now() - recStart) / 1000);
    $("recTimer").textContent =
      String(Math.floor(s / 60)).padStart(2, "0") + ":" + String(s % 60).padStart(2, "0");
    if (s >= MAX_SECONDS) stopRec();
  }, 100);
}
function stopRec() { if (mediaRec && mediaRec.state === "recording") mediaRec.stop(); }
function cancelRec() { recCancelled = true; stopRec(); }

// ================= knobs UI =================
const knobsEl = $("knobs");
const knobEls = {};
let expanded = null;

function knobArcLen(k) {
  const K = KNOBS[k];
  return (K.value - K.min) / (K.max - K.min) * 75; // 75% of circle
}
function makeKnob(key) {
  const el = document.createElement("div");
  el.className = "knob";
  el.innerHTML =
    `<svg viewBox="0 0 38 38">
       <circle class="track" cx="19" cy="19" r="17.5" pathLength="100" stroke-dasharray="75 100" transform="rotate(135 19 19)"/>
       <circle class="arc"   cx="19" cy="19" r="17.5" pathLength="100" transform="rotate(135 19 19)"/>
     </svg>
     <span class="letter">${key}</span>
     <span class="tip"></span>`;
  knobsEl.appendChild(el);
  knobEls[key] = el;
  updateKnob(key);

  let dragging = false, startY = 0, startV = 0;
  el.addEventListener("pointerdown", (e) => {
    e.stopPropagation();
    try { el.setPointerCapture(e.pointerId); } catch (err) {}
    if (expanded !== key) expandKnob(key);
    dragging = true; startY = e.clientY; startV = KNOBS[key].value;
  });
  el.addEventListener("pointermove", (e) => {
    if (!dragging) return;
    const K = KNOBS[key];
    const dv = (startY - e.clientY) / 150 * (K.max - K.min);
    K.value = Math.max(K.min, Math.min(K.max, startV + dv));
    updateKnob(key);
    saveKnobs();
  });
  const up = () => dragging = false;
  el.addEventListener("pointerup", up);
  el.addEventListener("pointercancel", up);
}
function updateKnob(key) {
  const el = knobEls[key], K = KNOBS[key];
  el.querySelector(".arc").setAttribute("stroke-dasharray", `${knobArcLen(key)} 100`);
  el.querySelector(".tip").textContent = K.label + " · " + K.fmt(K.value);
}
function expandKnob(key) {
  collapseKnob();
  expanded = key;
  knobEls[key].classList.add("big");
  document.body.classList.add("adjusting");
}
function collapseKnob() {
  if (!expanded) return;
  knobEls[expanded].classList.remove("big");
  expanded = null;
  document.body.classList.remove("adjusting");
}
$("closeKnob").addEventListener("click", collapseKnob);

function saveKnobs() {
  const o = {}; for (const k in KNOBS) o[k] = KNOBS[k].value;
  localStorage.setItem("granula-knobs", JSON.stringify(o));
}
function restoreKnobs() {
  try {
    const o = JSON.parse(localStorage.getItem("granula-knobs") || "{}");
    for (const k in o) if (KNOBS[k]) KNOBS[k].value = o[k];
  } catch (e) {}
}

// ================= XY morph (stage) =================
const stage = $("stage");
const pointers = new Map();
function morphFromPointers() {
  if (!pointers.size) return;
  let x = 0, y = 0;
  pointers.forEach(p => { x += p.x; y += p.y; });
  morph.tx = x / pointers.size; morph.ty = y / pointers.size;
}
stage.addEventListener("pointerdown", (e) => {
  collapseKnob();
  try { stage.setPointerCapture(e.pointerId); } catch (err) {}
  pointers.set(e.pointerId, { x: e.clientX / innerWidth, y: e.clientY / innerHeight, px: e.clientX, py: e.clientY });
  morph.touching = true; morphFromPointers();
});
stage.addEventListener("pointermove", (e) => {
  if (!pointers.has(e.pointerId)) return;
  pointers.set(e.pointerId, { x: e.clientX / innerWidth, y: e.clientY / innerHeight, px: e.clientX, py: e.clientY });
  morphFromPointers();
});
function releasePointer(e) {
  pointers.delete(e.pointerId);
  // латч: убрав палец, оставляем цель там, где отпустили (не сбрасываем в центр)
  if (!pointers.size) morph.touching = false;
  else morphFromPointers();
}
stage.addEventListener("pointerup", releasePointer);
stage.addEventListener("pointercancel", releasePointer);

// ================= visuals =================
// палитры: у каждого сэмпла своя, кроссфейд медленный
const PALETTES = ["ember", "orchid", "nebula"];
const palEls = {};
document.querySelectorAll(".palette").forEach(el => {
  palEls[el.dataset.pal] = {
    el, op: 0,
    top: el.querySelector(".bTop"), mid: el.querySelector(".bMid"), bot: el.querySelector(".bBot"),
  };
});
let activePal = "ember", samplePal = "ember";
const SHOW_FLAME = false; // фон-градиент временно выключен (вернуть: true)

function paletteFor(name) {
  let h = 0;
  for (let i = 0; i < name.length; i++) h = (h * 31 + name.charCodeAt(i)) >>> 0;
  return PALETTES[h % PALETTES.length];
}
function setPalette(p) { activePal = p; }

// медленное визуальное состояние: фон эволюционирует за пальцем с большой инерцией
const vis = { x: 0.5, y: 0.5 };
const levelArr = new Uint8Array(256);
const freqArr = new Uint8Array(256);
let slowLevel = 0, t0 = performance.now();

// ---- спектр: полосы (питают пламя, когда включено) ----
let bBass = 0, bMid = 0, bHigh = 0;

// ---- ASCII-частицы (стиль Cogmind): поле точек, вспышки глифов под пальцем ----
const fx = document.getElementById("fx");
const fxc = fx.getContext("2d");
let fxW = 0, fxH = 0, fxDpr = 1;

const GLYPHS = ".:;+*=!?/\\|<>[]{}()#%&$~^',";
// цвета углов: Halo голубой, Pulse маджента, Tide зелёный, Chaos оранжевый
const CORNER_RGB = {
  tl: [90, 200, 255], tr: [255, 80, 200],
  bl: [90, 230, 120], br: [255, 145, 50],
};
let CELL = 24, gCols = 0, gRows = 0;
let gInt = new Float32Array(0), gGlyph = new Uint8Array(0), gCol = [];
let dotsLayer = null;

function initGrid() {
  CELL = Math.round(24 * fxDpr);
  gCols = Math.ceil(fxW / CELL);
  gRows = Math.ceil(fxH / CELL);
  const n = gCols * gRows;
  gInt = new Float32Array(n);
  gGlyph = new Uint8Array(n);
  gCol = new Array(n).fill("");
  // фоновое поле тусклых точек — рисуем один раз в офскрин
  dotsLayer = document.createElement("canvas");
  dotsLayer.width = fxW; dotsLayer.height = fxH;
  const d = dotsLayer.getContext("2d");
  d.fillStyle = "#9aa0b4";
  const s = Math.max(1, Math.round(CELL * 0.08));
  for (let r = 0; r < gRows; r++)
    for (let c = 0; c < gCols; c++) {
      d.globalAlpha = 0.07 + Math.random() * 0.10;
      d.fillRect(c * CELL + (CELL - s) / 2, r * CELL + (CELL - s) / 2, s, s);
    }
  fxc.font = `500 ${Math.round(CELL * 0.74)}px "DM Mono", Menlo, Consolas, monospace`;
  fxc.textAlign = "center";
  fxc.textBaseline = "middle";
}
function sizeFx() {
  fxDpr = Math.min(2, window.devicePixelRatio || 1);
  fxW = fx.width = Math.floor(innerWidth * fxDpr);
  fxH = fx.height = Math.floor(innerHeight * fxDpr);
  initGrid();
}
sizeFx();
window.addEventListener("resize", sizeFx);
// когда DM Mono догрузится — перевыставить шрифт канваса
if (document.fonts && document.fonts.ready) document.fonts.ready.then(() => initGrid());

// цвет = билинейная смесь углов по позиции пальца
function cornerColor(u, v) {
  const w = { tl: (1 - u) * (1 - v), tr: u * (1 - v), bl: (1 - u) * v, br: u * v };
  let r = 0, g = 0, b = 0;
  for (const k in w) {
    r += CORNER_RGB[k][0] * w[k];
    g += CORNER_RGB[k][1] * w[k];
    b += CORNER_RGB[k][2] * w[k];
  }
  return [r, g, b];
}

// экранные углы для подсветки латча: [xFrac, yFrac, u, v] (u,v → чистый цвет угла)
// небольшой отступ от края — кластер садится у метки угла, а не за кнопками
const CORNER_POS = {
  tl: [0.05, 0.07, 0, 0], tr: [0.95, 0.07, 1, 0],
  bl: [0.05, 0.93, 0, 1], br: [0.95, 0.93, 1, 1],
};

function ignite(pxCss, pyCss, strength, u, v) {
  if (!gCols) return;
  const cx = (pxCss * fxDpr / CELL) | 0, cy = (pyCss * fxDpr / CELL) | 0;
  const base = cornerColor(Math.max(0, Math.min(1, u)), Math.max(0, Math.min(1, v)));
  for (let dy = -3; dy <= 3; dy++) {
    for (let dx = -3; dx <= 3; dx++) {
      const x = cx + dx, y = cy + dy;
      if (x < 0 || y < 0 || x >= gCols || y >= gRows) continue;
      const d2 = dx * dx + dy * dy;
      if (d2 > 11) continue;
      if (d2 > 6 && Math.random() < 0.45) continue; // рваный внешний край
      const f = strength * Math.max(0, 1 - Math.sqrt(d2) / 3.2);
      const i = y * gCols + x;
      if (f > gInt[i]) {
        gInt[i] = Math.min(1, f);
        const j = 0.8 + Math.random() * 0.45; // разброс яркости соседей
        gCol[i] = `rgb(${Math.min(255, base[0] * j) | 0},${Math.min(255, base[1] * j) | 0},${Math.min(255, base[2] * j) | 0})`;
        gGlyph[i] = (Math.random() * GLYPHS.length) | 0;
      }
    }
  }
}

function animate() {
  // ease morph (звук реагирует быстрее, чем фон)
  const k = morph.touching ? 0.16 : 0.03;
  morph.x += (morph.tx - morph.x) * k;
  morph.y += (morph.ty - morph.y) * k;

  // фон догоняет очень медленно — эмбиент
  vis.x += (morph.x - vis.x) * 0.006;
  vis.y += (morph.y - vis.y) * 0.006;

  // audio level (сглаженный); при записи — уровень с микрофона
  let level = 0, peakAmp = 0;
  const an = (isRecording && micAnalyser) ? micAnalyser : analyser;
  if (an) {
    an.getByteTimeDomainData(levelArr);
    let sum = 0;
    for (let i = 0; i < levelArr.length; i++) {
      const v = (levelArr[i] - 128) / 128;
      sum += v * v;
      const abs = v < 0 ? -v : v;
      if (abs > peakAmp) peakAmp = abs;
    }
    level = Math.sqrt(sum / levelArr.length);

    // спектр: полосы питают блобы пламени (когда SHOW_FLAME)
    an.getByteFrequencyData(freqArr);
    let s1 = 0, s2 = 0, s3 = 0;
    for (let i = 1; i < 6; i++) s1 += freqArr[i];
    for (let i = 6; i < 33; i++) s2 += freqArr[i];
    for (let i = 33; i < 121; i++) s3 += freqArr[i];
    bBass += (s1 / 5 / 255 - bBass) * 0.1;
    bMid  += (s2 / 27 / 255 - bMid) * 0.1;
    bHigh += (s3 / 88 / 255 - bHigh) * 0.1;
  }
  slowLevel += (level - slowLevel) * 0.08;

  const t = (performance.now() - t0) / 1000;
  const breathe = 0.04 * Math.sin(t * 0.35) + 0.03 * Math.sin(t * 0.21 + 1.7); // медленное дыхание
  const dx = (vis.x - 0.5) * 22;
  const dy = (vis.y - 0.5) * 10;
  const pulse = 1 + slowLevel * 1.3 + breathe;

  const tTop = `translate(${dx}vmin, ${dy * 0.6}vmin) scale(${0.92 + slowLevel * 1.0 + 0.3 * (1 - vis.y) + breathe})`;
  const tMid = `translate(${dx * 1.4}vmin, ${dy}vmin) scaleY(${pulse}) scaleX(${0.9 + slowLevel * 0.8 + breathe})`;
  const tBot = `translate(${dx * 0.7}vmin, ${-dy * 0.8}vmin) scale(${0.95 + slowLevel * 0.7 + 0.35 * vis.y - breathe})`;
  // полосы спектра дышат в блобы: низы — вниз, верха — вверх
  const oTop = (0.45 + slowLevel * 0.55 + 0.15 * (1 - vis.y)) * (0.55 + 0.85 * bHigh);
  const oMid = (0.35 + slowLevel * 0.8) * (0.55 + 0.85 * bMid);
  const oBot = (0.45 + slowLevel * 0.55 + 0.2 * vis.y) * (0.55 + 0.85 * bBass);

  for (const name in palEls) {
    const P = palEls[name];
    // кроссфейд палитр — медленный, ~3-4 секунды
    const target = SHOW_FLAME && name === activePal ? 1 : 0;
    P.op += (target - P.op) * 0.012;
    P.el.style.opacity = P.op.toFixed(3);
    if (P.op < 0.005) continue;
    P.top.style.transform = tTop; P.top.style.opacity = oTop;
    P.mid.style.transform = tMid; P.mid.style.opacity = oMid;
    P.bot.style.transform = tBot; P.bot.style.opacity = oBot;
  }

  // ---- осциллограмма записи ----
  if (isRecording) drawRecWave(peakAmp);

  // ---- ASCII-сетка ----
  // поджиг ячеек под пальцами (цвет — смесь углов по позиции)
  if (pointers.size && buffer) {
    pointers.forEach(p => ignite(p.px, p.py, 0.85 + level * 0.4, p.x, p.y));
  } else if (buffer) {
    // залоченный угол: палец убран, а морф уведён к углу — тлеет и дышит
    const cs = cornerStrengths();
    const puls = 0.8 + 0.2 * Math.sin(performance.now() / 430);
    for (const k in CORNER_POS) {
      if (cs[k] < 0.05) continue;
      const [px, py, u, v] = CORNER_POS[k];
      ignite(px * innerWidth, py * innerHeight, (0.5 + 0.5 * cs[k]) * puls, u, v);
    }
  }
  fxc.clearRect(0, 0, fxW, fxH);
  if (dotsLayer) fxc.drawImage(dotsLayer, 0, 0);
  const flick = 0.2 + level * 0.45; // звук ускоряет перебор символов
  for (let i = 0; i < gInt.length; i++) {
    const val = gInt[i];
    if (val < 0.02) { if (val !== 0) gInt[i] = 0; continue; }
    gInt[i] = val * 0.75; // хвост затухания
    const x = (i % gCols) * CELL, y = ((i / gCols) | 0) * CELL;
    if (Math.random() < flick) gGlyph[i] = (Math.random() * GLYPHS.length) | 0;
    fxc.fillStyle = gCol[i];
    if (val > 0.78) {
      // ядро — плотная заливка, поверх иногда тёмный глиф (как в референсе)
      fxc.globalAlpha = val;
      fxc.fillRect(x + CELL * 0.06, y + CELL * 0.06, CELL * 0.88, CELL * 0.88);
      if (gGlyph[i] & 1) {
        fxc.globalAlpha = 0.55;
        fxc.fillStyle = "#000";
        fxc.fillText(GLYPHS[gGlyph[i]], x + CELL / 2, y + CELL / 2 + 1);
      }
    } else {
      // ореол: полупрозрачная заливка на всех ячейках кластера — радиус нажатия виден
      fxc.globalAlpha = 0.12 + val * 0.5;
      fxc.fillRect(x + CELL * 0.06, y + CELL * 0.06, CELL * 0.88, CELL * 0.88);
      fxc.globalAlpha = Math.min(1, val * 1.35);
      fxc.fillText(GLYPHS[gGlyph[i]], x + CELL / 2, y + CELL / 2 + 1);
    }
  }
  fxc.globalAlpha = 1;

  requestAnimationFrame(animate);
}

// ================= library UI =================
async function renderLibrary() {
  const list = $("libList");
  list.innerHTML = "";
  const rows = (await dbAll()) || [];
  rows.sort((a, b) => b.ts - a.ts);

  const builtin = document.createElement("div");
  builtin.className = "librow" + (currentId === null && currentName.startsWith("Pad") ? " current" : "");
  builtin.innerHTML = `<span class="nm">Pad · встроенный</span><span class="dur">5.0s</span>`;
  builtin.addEventListener("click", () => { useBuiltin(); hideLibrary(); renderLibrary(); });
  list.appendChild(builtin);

  for (const r of rows) {
    const el = document.createElement("div");
    el.className = "librow" + (r.id === currentId ? " current" : "");
    el.innerHTML = `<span class="nm"></span><span class="dur">${r.duration.toFixed(1)}s</span><button class="edit">✎</button><button class="del">✕</button>`;
    el.querySelector(".nm").textContent = r.name;
    el.querySelector(".nm").addEventListener("click", async () => {
      const rec = await dbGet(r.id);
      if (rec && await useBlob(rec.blob, rec.name, rec.id)) { hideLibrary(); renderLibrary(); }
    });
    el.querySelector(".edit").addEventListener("click", (e) => {
      e.stopPropagation();
      startRename(el, r);
    });
    el.querySelector(".del").addEventListener("click", async (e) => {
      e.stopPropagation();
      await dbDel(r.id);
      if (r.id === currentId) setCurrent(currentName, null);
      renderLibrary();
    });
    list.appendChild(el);
  }
}

// инлайн-переименование: ✎ → инпут, Enter/блюр — сохранить в IndexedDB
function startRename(rowEl, r) {
  const nm = rowEl.querySelector(".nm");
  const input = document.createElement("input");
  input.type = "text";
  input.className = "nm-edit";
  input.maxLength = 40;
  input.value = r.name;
  nm.replaceWith(input);
  input.focus();
  input.select();
  const commit = async () => {
    const newName = input.value.trim();
    if (newName && newName !== r.name) {
      const rec = await dbGet(r.id);
      if (rec) {
        rec.name = newName;
        await dbPut(rec);
        if (r.id === currentId) {
          setCurrent(newName, r.id);
          samplePal = paletteFor(newName);
          setPalette(samplePal);
        }
      }
    }
    renderLibrary();
  };
  input.addEventListener("keydown", (ev) => {
    if (ev.key === "Enter") input.blur();
    if (ev.key === "Escape") { input.value = r.name; input.blur(); }
  });
  input.addEventListener("blur", commit, { once: true });
}
function showLibrary() { renderLibrary(); $("library").classList.add("show"); }
function hideLibrary() { $("library").classList.remove("show"); }
$("sampleChip").addEventListener("click", showLibrary);
$("library").addEventListener("click", (e) => { if (e.target === $("library")) hideLibrary(); });
$("file").addEventListener("change", (e) => { if (e.target.files[0]) loadFile(e.target.files[0]); e.target.value = ""; });

// ================= transport =================
$("playBtn").addEventListener("click", () => {
  playing = !playing;
  $("playBtn").textContent = playing ? "❚❚" : "▶";
  if (playing) startCloud(); else stopCloud();
});
$("recBtn").addEventListener("click", startRec);
$("stopBtn").addEventListener("click", stopRec);
$("recClose").addEventListener("click", cancelRec);

// ================= стартовый экран: пиксельное сияние =================
// «сири»-свечение по краям из цветов углов пэда, точки в общем стиле
const startFx = $("startFx");
const sctx = startFx.getContext("2d");
let startRaf = null;
const START_COLORS = [ // только холодные: синий → циан → фиолет → маджента
  [90, 200, 255],  // синий (Halo)
  [80, 220, 230],  // циан
  [150, 90, 255],  // фиолет
  [255, 80, 200],  // маджента (Pulse)
];

function startGlow() {
  if (!innerWidth || !innerHeight) { setTimeout(startGlow, 300); return; }
  const dpr = Math.min(2, devicePixelRatio || 1);
  const W = startFx.width = Math.floor(innerWidth * dpr);
  const H = startFx.height = Math.floor(innerHeight * dpr);
  const P = 14 * dpr, dot = 3 * dpr;
  const cols = Math.ceil(W / P), rows = Math.ceil(H / P);
  const DEPTH = 8; // максимальная глубина свечения в ячейках от края
  const TAU = Math.PI * 2;
  const cells = [];
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const d = Math.min(c, r, cols - 1 - c, rows - 1 - r);
      if (d >= DEPTH) continue;
      const ang = Math.atan2(r / (rows - 1) - 0.5, c / (cols - 1) - 0.5);
      cells.push({
        cx: c * P + P / 2,
        cy: r * P + P / 2,
        d, u: ang / TAU + 0.5, // 0..1 вокруг центра
        jit: Math.random() * TAU,
      });
    }
  }
  const t0 = performance.now();
  const frame = () => {
    const t = (performance.now() - t0) / 1000;
    sctx.clearRect(0, 0, W, H);
    for (const cell of cells) {
      // «эквалайзер» по периметру: глубина свечения в этой точке рамки —
      // сумма трёх несинхронных волн, бегущих вдоль края с разными скоростями
      const u = cell.u;
      const wave =
        0.45 * Math.sin(u * TAU * 3 + t * 3.15) +
        0.35 * Math.sin(u * TAU * 7 - t * 4.8) +
        0.20 * Math.sin(u * TAU * 13 + t * 6.9);
      const hDepth = DEPTH * (0.12 + 0.5 * (0.5 + 0.5 * wave)); // ~1..5 ячеек — ближе к краю
      const inten = Math.max(0, 1 - cell.d / hDepth);
      if (inten <= 0.01) continue;
      const pulse = Math.pow(inten, 1.7) * (0.72 + 0.28 * Math.sin(t * 5.1 + cell.jit));
      // цвета плывут по периметру
      const seg = ((u - 0.125 + t * 0.09) % 1 + 1) % 1 * 4;
      const i0 = seg | 0, f = seg - i0;
      const A = START_COLORS[i0], B = START_COLORS[(i0 + 1) % 4];
      const s = dot * (1 + 1.3 * pulse); // размер следует за интенсивностью
      sctx.globalAlpha = Math.min(1, pulse * 1.15);
      sctx.fillStyle = `rgb(${(A[0] + (B[0] - A[0]) * f) | 0},${(A[1] + (B[1] - A[1]) * f) | 0},${(A[2] + (B[2] - A[2]) * f) | 0})`;
      sctx.fillRect(cell.cx - s / 2, cell.cy - s / 2, s, s);
    }
    sctx.globalAlpha = 1;
    startRaf = requestAnimationFrame(frame);
  };
  frame();
}
startGlow();

// ================= boot =================
$("start").addEventListener("click", async () => {
  cancelAnimationFrame(startRaf);
  initAudio();
  // не ждём resume: если ОС тянет с активацией аудио, UI всё равно строим,
  // звук поднимет страховочный pointerdown-обработчик
  ctx.resume().catch(() => {});
  setInterval(gateTick, 25);
  restoreKnobs();
  for (const k of ["G", "P", "D", "S"]) makeKnob(k);
  $("start").classList.remove("show");

  try { db = await openDB(); } catch (e) { db = null; }
  const last = parseInt(localStorage.getItem("granula-last"), 10);
  let loaded = false;
  if (db && !isNaN(last)) {
    const rec = await dbGet(last);
    if (rec) loaded = await useBlob(rec.blob, rec.name, rec.id);
  }
  if (!loaded) useBuiltin();

  animate();
}, { once: true });

// страховка: если ОС подвесила аудиоконтекст (звонок, сворачивание) — будим тапом
document.addEventListener("pointerdown", () => {
  if (ctx && ctx.state === "suspended" && !isRecording) ctx.resume();
});

// PWA: регистрация service worker (нужен https или localhost)
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("sw.js").catch(() => {});
  });
}

})();
</script>
